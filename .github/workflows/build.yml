name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux · Ubuntu ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libopencv-dev \
            libpotrace-dev \
            libx11-dev \
            libxtst-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: List outputs
        run: ls -la build

      - name: Smoke test
        run: ./build/lineart_drawer single ./include/common.h /tmp/out.svg 2>&1 || true

      - name: Upload artifact
        if: matrix.os == 'ubuntu-24.04'
        uses: actions/upload-artifact@v4
        with:
          name: lineart_drawer-linux
          path: |
            build/lineart_drawer
            build/liblineart_core.a

  build-windows:
    name: Windows · MSVC
    runs-on: windows-2022
    env:
      VCPKG_ROOT: C:\vcpkg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          cd $env:VCPKG_ROOT
          git pull 2>&1 | Out-Null
          .\bootstrap-vcpkg.bat -disableMetrics

      - name: Install OpenCV via vcpkg (dynamic, much faster)
        shell: pwsh
        run: |
          cd $env:VCPKG_ROOT
          .\vcpkg install opencv:x64-windows --recurse

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DBUILD_WITH_WINAPI=ON

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release -j

      - name: List outputs
        shell: pwsh
        run: Get-ChildItem -Recurse build\*.exe,build\*.lib -ErrorAction SilentlyContinue | Select-Object FullName,Length

      - name: Collect release binaries with DLLs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-win | Out-Null
          Copy-Item build\bin\Release\lineart_drawer.exe dist-win\ -Force -ErrorAction SilentlyContinue
          # 复制 vcpkg 安装的 opencv 运行时 DLL
          $vcpkgBin = "$env:VCPKG_ROOT\installed\x64-windows\bin"
          if (Test-Path $vcpkgBin) {
              Copy-Item "$vcpkgBin\opencv_core*.dll" dist-win\ -Force -ErrorAction SilentlyContinue
              Copy-Item "$vcpkgBin\opencv_imgcodecs*.dll" dist-win\ -Force -ErrorAction SilentlyContinue
              Copy-Item "$vcpkgBin\opencv_imgproc*.dll" dist-win\ -Force -ErrorAction SilentlyContinue
              Copy-Item "$vcpkgBin\opencv_highgui*.dll" dist-win\ -Force -ErrorAction SilentlyContinue
              Copy-Item "$vcpkgBin\zlib1.dll" dist-win\ -Force -ErrorAction SilentlyContinue
          }
          Get-ChildItem dist-win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lineart_drawer-windows
          path: dist-win/*

  release:
    name: Release on tag v*
    needs: [build-linux, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: lineart_drawer-linux
          path: dist-linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: lineart_drawer-windows
          path: dist-windows

      - name: Package
        run: |
          tar -czf lineart_drawer-linux.tar.gz -C dist-linux .
          tar -czf lineart_drawer-windows.tar.gz -C dist-windows .
          ls -lah *.tar.gz

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lineart_drawer-linux.tar.gz
            lineart_drawer-windows.tar.gz
          generate_release_notes: true
