name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build on Ubuntu ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libopencv-dev \
            libpotrace-dev \
            libx11-dev \
            libxtst-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: List outputs
        run: ls -la build

      - name: Smoke test
        run: ./build/lineart_drawer single ./include/common.h /tmp/out.svg 2>&1 || true

      - name: Upload artifact
        if: matrix.os == 'ubuntu-24.04'
        uses: actions/upload-artifact@v4
        with:
          name: lineart_drawer-linux
          path: |
            build/lineart_drawer
            build/liblineart_core.a

  release:
    name: Release on tag
    needs: build-linux
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: lineart_drawer-linux
          path: dist

      - name: Package
        run: tar -czf lineart_drawer-linux.tar.gz -C dist .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: lineart_drawer-linux.tar.gz
          generate_release_notes: true
